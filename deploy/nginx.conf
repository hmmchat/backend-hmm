events {}

http {
  # Required for WebSocket upgrade
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream api_gateway {
    server api-gateway:3000;
  }

  upstream friend_service {
    server friend-service:3009;
  }

  server {
    listen 80;

    # WebSocket: friends realtime messaging
    location /v1/friends/ws {
      proxy_pass http://friend_service/friends/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # WebSocket: streaming (already supported by streaming-service path)
    # If you currently expose streaming WS directly, you can remove this.
    location /streaming/ws {
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Everything else goes to the API gateway (HTTP)
    location / {
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}

