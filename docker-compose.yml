version: '3.8'

services:
  # Database
  postgres:
    image: postgres:16-alpine
    container_name: hmm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: hmm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: hmm-auth-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/auth-service?schema=public
      - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # User Service
  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: hmm-user-service
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/user-service?schema=public
      - MODERATION_SERVICE_URL=http://moderation-service:3003
      - WALLET_SERVICE_URL=http://wallet-service:3005
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      moderation-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Moderation Service
  moderation-service:
    build:
      context: .
      dockerfile: apps/moderation-service/Dockerfile
    container_name: hmm-moderation-service
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/moderation-service?schema=public
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Discovery Service
  discovery-service:
    build:
      context: .
      dockerfile: apps/discovery-service/Dockerfile
    container_name: hmm-discovery-service
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hmm_user?schema=public
      - REDIS_URL=redis://redis:6379
      - USER_SERVICE_URL=http://user-service:3002
      - FRIEND_SERVICE_URL=http://friend-service:3009
      - STREAMING_SERVICE_URL=http://streaming-service:3006
      - WALLET_SERVICE_URL=http://wallet-service:3005
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Streaming Service
  streaming-service:
    build:
      context: .
      dockerfile: apps/streaming-service/Dockerfile
    container_name: hmm-streaming-service
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/streaming-service?schema=public
      - USER_SERVICE_URL=http://user-service:3002
      - DISCOVERY_SERVICE_URL=http://discovery-service:3004
      - FRIEND_SERVICE_URL=http://friend-service:3009
      - WALLET_SERVICE_URL=http://wallet-service:3005
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Wallet Service
  wallet-service:
    build:
      context: .
      dockerfile: apps/wallet-service/Dockerfile
    container_name: hmm-wallet-service
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/wallet-service?schema=public
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    container_name: hmm-payment-service
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/payment-service?schema=public
      - WALLET_SERVICE_URL=http://wallet-service:3005
    ports:
      - "3007:3007"
    depends_on:
      postgres:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/v1/payments/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Files Service
  files-service:
    build:
      context: .
      dockerfile: apps/files-service/Dockerfile
    container_name: hmm-files-service
    environment:
      - NODE_ENV=production
      - PORT=3008
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/files-service?schema=public
    ports:
      - "3008:3008"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3008/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Friend Service
  friend-service:
    build:
      context: .
      dockerfile: apps/friend-service/Dockerfile
    container_name: hmm-friend-service
    environment:
      - NODE_ENV=production
      - PORT=3009
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/friend-service?schema=public
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - WALLET_SERVICE_URL=http://wallet-service:3005
      - STREAMING_SERVICE_URL=http://streaming-service:3006
      - FILES_SERVICE_URL=http://files-service:3008
    ports:
      - "3009:3009"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3009/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Ads Service
  ads-service:
    build:
      context: .
      dockerfile: apps/ads-service/Dockerfile
    container_name: hmm-ads-service
    environment:
      - NODE_ENV=production
      - PORT=3010
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ads-service?schema=public
      - WALLET_SERVICE_URL=http://wallet-service:3005
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: hmm-api-gateway
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - MODERATION_SERVICE_URL=http://moderation-service:3003
      - DISCOVERY_SERVICE_URL=http://discovery-service:3004
      - STREAMING_SERVICE_URL=http://streaming-service:3006
      - WALLET_SERVICE_URL=http://wallet-service:3005
      - PAYMENT_SERVICE_URL=http://payment-service:3007
      - FILES_SERVICE_URL=http://files-service:3008
      - FRIEND_SERVICE_URL=http://friend-service:3009
      - ADS_SERVICE_URL=http://ads-service:3010
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
