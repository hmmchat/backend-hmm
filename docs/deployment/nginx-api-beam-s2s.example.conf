# Reference: nginx on the MAIN / backend droplet (api.beam.place + Redis TCP proxy).
# Copy patterns into your live config; paths and IPs must match your deployment.
#
# Prerequisites:
# - apt install libnginx-mod-stream   (enables top-level `stream { }` in nginx.conf)
# - In /etc/nginx/nginx.conf, ensure: include /etc/nginx/modules-enabled/*.conf;
# - Append the `stream { ... }` block at the END of nginx.conf (outside `http { }`).
#
# Replace STREAMING_PUBLIC_IP with the streaming droplet public IP (e.g. 64.227.x.x).

