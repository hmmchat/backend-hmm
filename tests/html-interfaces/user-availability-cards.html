<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMM Available Users Card Feed</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --available: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input,
        select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background: linear-gradient(to right, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            align-self: flex-end;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .user-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(12px);
            position: relative;
        }

        .user-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .card-image-container {
            width: 100%;
            height: 320px;
            position: relative;
            background: #1e293b;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--available);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }

            100% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        .card-content {
            padding: 20px;
        }

        .user-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .user-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .user-intent {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #d1d5db;
            margin-bottom: 20px;
            font-style: italic;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .city-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--primary-light);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 0;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>HMM Availability Pulse</h1>
            <p class="subtitle">Live feed of all users currently AVAILABLE for video calls</p>
        </header>

        <div class="controls">
            <div class="input-group">
                <label>Gateway URL</label>
                <input type="text" id="gatewayUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
            </div>
            <div class="input-group">
                <label>Limit</label>
                <input type="number" id="limit" value="20" min="1" max="100">
            </div>
            <button onclick="fetchAvailableUsers()">Refresh Feed</button>
        </div>

        <div id="loading" style="display: none;">
            <div class="loading-spinner"></div>
            <p style="text-align: center;">Fetching active pulses...</p>
        </div>

        <div class="grid" id="userGrid">
            <!-- Cards will be injected here -->
            <div class="empty-state">
                <p>Click "Refresh Feed" to see who is available.</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchAvailableUsers() {
            const grid = document.getElementById('userGrid');
            const loading = document.getElementById('loading');
            const gatewayUrl = document.getElementById('gatewayUrl').value;
            const limit = parseInt(document.getElementById('limit').value);

            grid.innerHTML = '';
            loading.style.display = 'block';

            try {
                // Fetch directly from user-service for better compatibility in test env
                // or via gateway if available. We'll try gateway first.
                const response = await fetch(`${gatewayUrl}/v1/users/discovery`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        statuses: ["AVAILABLE", "IN_SQUAD_AVAILABLE", "IN_BROADCAST_AVAILABLE"],
                        limit: limit
                    })
                });

                if (!response.ok) {
                    throw new Error(`Gateway returned ${response.status}`);
                }

                const data = await response.json();
                const users = data.users || [];

                loading.style.display = 'none';

                if (!users || users.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><p>No users are currently available. Try running setup-test-data.sh first.</p></div>';
                    return;
                }

                grid.innerHTML = users.map(user => {
                    const age = calculateAge(user.dateOfBirth);
                    const profile = user.profile || user;
                    const status = user.status || "AVAILABLE";
                    const city = profile.preferredCity || profile.city || "Unknown";
                    const intent = profile.intent || "Ready to connect!";
                    const photo = profile.displayPictureUrl || 'https://via.placeholder.com/300?text=No+Photo';

                    return `
                        <div class="user-card">
                            <div class="card-image-container">
                                <img src="${photo}" class="card-image" alt="${user.username}" onerror="this.src='https://via.placeholder.com/300?text=Error'">
                                <div class="status-badge">
                                    <span class="status-dot"></span>
                                    ${status.replace(/_/g, ' ')}
                                </div>
                            </div>
                            <div class="card-content">
                                <div class="user-name">${user.username || 'Anonymous'}</div>
                                <div class="user-meta">
                                    <span>${age} years</span>
                                    <span>•</span>
                                    <span>${profile.gender || 'Unknown'}</span>
                                </div>
                                <div class="user-intent">"${intent}"</div>
                                <div class="card-footer">
                                    <div class="city-tag">📍 ${city}</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted)">ID: ${user.id.substring(0, 8)}...</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                loading.style.display = 'none';
                grid.innerHTML = `
                    <div class="empty-state">
                        <p style="color: #ef4444;">❌ Error: ${error.message}</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">Check if API Gateway is running on ${gatewayUrl}</p>
                        <button onclick="fetchAvailableUsers()" style="margin-top: 20px; background: #334155;">Retry</button>
                    </div>
                `;
            }
        }

        function calculateAge(dob) {
            if (!dob) return '??';
            const birthDate = new Date(dob);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        // Auto-fetch on load
        window.onload = fetchAvailableUsers;
    </script>
</body>

</html>
